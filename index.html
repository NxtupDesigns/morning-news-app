<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morning News</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px auto;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .word {
      cursor: pointer;
      color: black;
    }

    .word:hover {
      background: #e0e0e0;
    }

    #popup {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      color: white;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>

<h1>Morning News</h1>

<div id="news"></div>

<div id="popup" style="
  position: fixed;
  left: 50%;
  bottom: 30px;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 14px 18px;
  border-radius: 14px;
  display: none;
  max-width: 80%;
  text-align: center;
  font-size: 16px;
  z-index: 9999;
"></div>

<script>
const dictionary = {
  climate: "weather over a long time",
  summit: "important meeting",
  cooperation: "working together",
  energy: "power",
  economy: "money system"
};

async function loadNews() {
  const res = await fetch("https://content.guardianapis.com/search?api-key=test&show-fields=trailText");
  const data = await res.json();

  const container = document.getElementById("news");
  container.innerHTML = "";

  data.response.results.slice(0,5).forEach(article => {
    const div = document.createElement("div");
    div.className = "card";

    const text = article.fields.trailText || "No summary available";

    div.innerHTML = `
      <h3>${article.webTitle}</h3>
      <p>${makeClickable(text)}</p>
    `;

    container.appendChild(div);
  });
}

function makeClickable(text) {
  return text.split(" ").map(word => {
    return `<span class="word" onclick="showMeaning('${word}')">${word}</span>`;
  }).join(" ");
}

function showMeaning(word) {
  const popup = document.getElementById("popup");
  const clean = word.toLowerCase().replace(/[^a-z]/g, "");

  const meaning = dictionary[clean] || "Simple English word";

  popup.innerText = word + ": " + meaning;
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 2000);
}

loadNews();
</script>

</body>
</html>
