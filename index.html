<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morning English News</title>
  <style>
    :root {
      --bg: #f6f3f9;
      --surface: #fffbff;
      --surface-2: #f3edf7;
      --text: #1d1b20;
      --text-soft: #49454f;
      --primary: #6750a4;
      --primary-soft: #e8def8;
      --outline: #d0c7da;
      --shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8f5fb 0%, #f1edf5 100%);
      color: var(--text);
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }

    .hero {
      background: var(--surface);
      border-radius: 32px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .badge {
      display: inline-block;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 38px;
      line-height: 1.08;
      letter-spacing: -0.5px;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--text-soft);
      font-size: 16px;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .chip {
      background: var(--surface-2);
      color: var(--text-soft);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      transition: 0.15s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
    }

    .chip.active {
      background: var(--primary);
      color: white;
    }

    .refresh-btn {
      background: var(--primary);
      color: white;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 18px;
      margin: 24px 6px 14px;
      color: var(--text-soft);
      font-weight: 700;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      border: 1px solid rgba(103, 80, 164, 0.06);
    }

    .category {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      background: var(--primary-soft);
      color: var(--primary);
      padding: 7px 11px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .title {
      margin: 0 0 14px;
      font-size: 28px;
      line-height: 1.2;
    }

    .summary {
      margin: 0;
      color: var(--text-soft);
      font-size: 18px;
      line-height: 1.7;
    }

    .word {
      cursor: pointer;
      border-radius: 8px;
      padding: 1px 2px;
      transition: background 0.15s ease;
    }

    .word:hover {
      background: #ede7f6;
    }

    .word:active {
      background: #ddd0f3;
    }

    .loading-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: 22px;
      box-shadow: var(--shadow);
      color: var(--text-soft);
      font-size: 17px;
    }

    .popup-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(29, 27, 32, 0.24);
      display: none;
      z-index: 9998;
    }

    .popup {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: calc(100% - 24px);
      max-width: 520px;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      padding: 18px;
      display: none;
      z-index: 9999;
      border: 1px solid rgba(103, 80, 164, 0.08);
    }

    .popup-word {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .popup-meaning {
      font-size: 16px;
      line-height: 1.55;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    .popup-translation {
      font-size: 15px;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .popup-close {
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .hero {
        padding: 20px;
        border-radius: 28px;
      }

      h1 {
        font-size: 30px;
      }

      .title {
        font-size: 22px;
      }

      .summary {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="badge">Morning English News</div>
      <h1>Read the news in simple English</h1>
      <div class="subtitle">
        Short morning news with clickable words. Tap any word to see a short explanation and a German translation.
      </div>

      <div class="controls">
        <button class="refresh-btn" id="refreshBtn">Refresh news</button>
        <button class="chip active" data-filter="All">All</button>
        <button class="chip" data-filter="World">World</button>
        <button class="chip" data-filter="Business">Business</button>
        <button class="chip" data-filter="Science">Science</button>
        <button class="chip" data-filter="Technology">Technology</button>
      </div>
    </div>

    <div class="section-title">Top stories</div>
    <div id="news">
      <div class="loading-card">Loading news...</div>
    </div>
  </div>

  <div id="popupBackdrop" class="popup-backdrop"></div>

  <div id="popup" class="popup">
    <div id="popupWord" class="popup-word"></div>
    <div id="popupMeaning" class="popup-meaning"></div>
    <div id="popupTranslation" class="popup-translation"></div>
    <button class="popup-close" id="closePopupBtn">Close</button>
  </div>

  <script>
    var dictionary = {
      climate: { meaning: "the usual weather in a place over a long time", translation: "Klima" },
      summit: { meaning: "an important meeting between leaders", translation: "Gipfeltreffen" },
      cooperation: { meaning: "working together with other people", translation: "Zusammenarbeit" },
      energy: { meaning: "power used for heat, light, or movement", translation: "Energie" },
      economy: { meaning: "the money and business system of a country", translation: "Wirtschaft" },
      support: { meaning: "help that is given to someone", translation: "Unterstützung" },
      government: { meaning: "the people who run a country", translation: "Regierung" },
      income: { meaning: "money that a person earns", translation: "Einkommen" },
      president: { meaning: "the leader of a country in some systems", translation: "Präsident" },
      negotiators: { meaning: "people who try to reach an agreement by talking", translation: "Verhandlungsführer" },
      ceasefire: { meaning: "an agreement to stop fighting for some time", translation: "Waffenruhe" },
      proposal: { meaning: "a plan or suggestion", translation: "Vorschlag" },
      package: { meaning: "a group of measures offered together", translation: "Paket" },
      household: { meaning: "all the people living in one home", translation: "Haushalt" },
      bills: { meaning: "amounts of money that must be paid", translation: "Rechnungen" },
      nation: { meaning: "a country and its people", translation: "Nation" },
      operation: { meaning: "an organized action or activity", translation: "Operation" },
      markets: { meaning: "systems where things are bought and sold", translation: "Märkte" },
      prices: { meaning: "how much money something costs", translation: "Preise" },
      sharply: { meaning: "quickly and strongly", translation: "deutlich" },
      hopes: { meaning: "feelings that something good may happen", translation: "Hoffnungen" },
      address: { meaning: "to speak to people formally", translation: "ansprechen / eine Rede halten" },
      results: { meaning: "the outcomes of something", translation: "Ergebnisse" },
      crisis: { meaning: "a very difficult or dangerous situation", translation: "Krise" },
      war: { meaning: "fighting between countries or large groups", translation: "Krieg" },
      attack: { meaning: "a violent act against someone or something", translation: "Angriff" },
      responsibility: { meaning: "being the one who caused something", translation: "Verantwortung" },
      barrel: { meaning: "a unit used to measure oil", translation: "Fass / Barrel" },
      oil: { meaning: "a thick liquid used for fuel", translation: "Öl" },
      live: { meaning: "happening right now", translation: "live / aktuell" },
      talks: { meaning: "discussions between people or groups", translation: "Gespräche" },
      later: { meaning: "after now", translation: "später" },
      today: { meaning: "on this day", translation: "heute" },
      officials: { meaning: "people with an important public job", translation: "Beamte / Verantwortliche" },
      minister: { meaning: "a high-ranking government leader", translation: "Minister" },
      leader: { meaning: "a person who guides or controls a group", translation: "Anführer / Leiter" },
      leaders: { meaning: "people who guide or control a group", translation: "Führungspersonen" },
      plan: { meaning: "an idea for how to do something", translation: "Plan" },
      plans: { meaning: "ideas for how to do something", translation: "Pläne" },
      growth: { meaning: "an increase in size or success", translation: "Wachstum" },
      trade: { meaning: "buying and selling between people or countries", translation: "Handel" },
      deal: { meaning: "an agreement", translation: "Abkommen / Deal" },
      deals: { meaning: "agreements", translation: "Abkommen / Deals" },
      change: { meaning: "to become different", translation: "ändern / Veränderung" },
      changes: { meaning: "things that become different", translation: "Veränderungen" },
      global: { meaning: "connected with the whole world", translation: "global / weltweit" },
      public: { meaning: "for everyone, not private", translation: "öffentlich" }
    };

    var allArticles = [];
    var currentFilter = "All";

    function cleanWord(word) {
      return String(word || "").toLowerCase().replace(/[^a-z]/g, "");
    }

    function simplifyText(text) {
      if (!text) return "No summary available.";
      var plain = text.replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
      var sentences = plain.match(/[^.!?]+[.!?]?/g) || [plain];
      return sentences.slice(0, 3).join(" ").trim();
    }

    function getCategory(sectionName, title) {
      var s = String(sectionName || "").toLowerCase();
      var t = String(title || "").toLowerCase();

      if (s.indexOf("world") !== -1 || s.indexOf("politics") !== -1 || t.indexOf("war") !== -1 || t.indexOf("president") !== -1) {
        return "World";
      }
      if (s.indexOf("business") !== -1 || s.indexOf("money") !== -1 || t.indexOf("market") !== -1 || t.indexOf("prices") !== -1) {
        return "Business";
      }
      if (s.indexOf("science") !== -1 || s.indexOf("environment") !== -1) {
        return "Science";
      }
      if (s.indexOf("technology") !== -1 || s.indexOf("tech") !== -1) {
        return "Technology";
      }
      return "World";
    }

    function makeClickable(text) {
      return text.split(/(\s+)/).map(function(part) {
        if (!part.trim()) return part;

        var cleaned = cleanWord(part);
        if (!cleaned) return part;

        var span = '<span class="word" data-word="' + part.replace(/"/g, "&quot;") + '">' + part + '</span>';
        return span;
      }).join("");
    }

    function showMeaning(word) {
      var cleaned = cleanWord(word);
      var entry = dictionary[cleaned];

      document.getElementById("popupWord").innerText = word;

      if (entry) {
        document.getElementById("popupMeaning").innerText = entry.meaning;
        document.getElementById("popupTranslation").innerText = "Deutsch: " + entry.translation;
      } else {
        document.getElementById("popupMeaning").innerText = "No saved explanation for this word yet.";
        document.getElementById("popupTranslation").innerText = "Deutsch: keine gespeicherte Übersetzung";
      }

      document.getElementById("popup").style.display = "block";
      document.getElementById("popupBackdrop").style.display = "block";
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("popupBackdrop").style.display = "none";
    }

    function renderNews() {
      var news = document.getElementById("news");
      news.innerHTML = "";

      var filtered = allArticles.filter(function(article) {
        return currentFilter === "All" || article.category === currentFilter;
      });

      if (filtered.length === 0) {
        news.innerHTML = '<div class="loading-card">No news found in this category.</div>';
        return;
      }

      filtered.forEach(function(article) {
        var card = document.createElement("div");
        card.className = "card";

        var category = document.createElement("div");
        category.className = "category";
        category.textContent = article.category;

        var title = document.createElement("h2");
        title.className = "title";
        title.textContent = article.title;

        var summary = document.createElement("p");
        summary.className = "summary";
        summary.innerHTML = makeClickable(article.summary);

        card.appendChild(category);
        card.appendChild(title);
        card.appendChild(summary);
        news.appendChild(card);
      });
    }

    async function loadNews() {
      var news = document.getElementById("news");
      news.innerHTML = '<div class="loading-card">Loading news...</div>';

      try {
        var targetUrl = "https://content.guardianapis.com/search?api-key=test&page-size=10&show-fields=trailText&order-by=newest";
        var proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);

        var response = await fetch(proxyUrl);
        var wrapped = await response.json();
        var data = JSON.parse(wrapped.contents);

        var results = (data.response && data.response.results) ? data.response.results : [];

        allArticles = results.map(function(article) {
          return {
            title: article.webTitle || "No title",
            summary: simplifyText(article.fields && article.fields.trailText ? article.fields.trailText : ""),
            category: getCategory(article.sectionName, article.webTitle)
          };
        });

        renderNews();
      } catch (error) {
        console.error(error);
        news.innerHTML = '<div class="loading-card">Could not load news right now. Tap "Refresh news".</div>';
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", function() {
      loadNews();
    });

    document.querySelectorAll(".chip").forEach(function(button) {
      button.addEventListener("click", function() {
        document.querySelectorAll(".chip").forEach(function(b) {
          b.classList.remove("active");
        });

        button.classList.add("active");
        currentFilter = button.getAttribute("data-filter");
        renderNews();
      });
    });

    document.getElementById("news").addEventListener("click", function(event) {
      if (event.target.classList.contains("word")) {
        var word = event.target.getAttribute("data-word");
        showMeaning(word);
      }
    });

    document.getElementById("closePopupBtn").addEventListener("click", closePopup);
    document.getElementById("popupBackdrop").addEventListener("click", closePopup);

    loadNews();
  </script>
</body>
</html>
